<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xenon Onyx | Stable</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --onyx: #050505; --panel: #0c0c0d; --xenon: #00f2ff; --red: #ff3b3b; }
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--onyx); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        #app { display: none; height: 100vh; grid-template-columns: 72px 260px 1fr; }

        /* Left Rail */
        .rail { background: #000; display: flex; flex-direction: column; align-items: center; padding: 12px 0; border-right: 1px solid #1a1a1a; gap: 12px; }
        .s-btn { width: 48px; height: 48px; background: #111; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid #222; font-size: 10px; font-weight: bold; }
        .s-btn.active { border-radius: 14px; border-color: var(--xenon); color: var(--xenon); box-shadow: 0 0 10px var(--xenon); }

        /* Sidebar */
        .side { background: var(--panel); border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; padding: 15px; }
        .id-card { background: #000; padding: 12px; border-radius: 8px; font-size: 10px; border: 1px solid #222; margin-bottom: 20px; color: var(--xenon); cursor: pointer; word-break: break-all; }
        
        /* Chat Area */
        .main { display: flex; flex-direction: column; background: var(--onyx); position: relative; height: 100%; }
        #chat-flow { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px; border-radius: 10px; background: #0e0e0f; border: 1px solid #1a1a1a; max-width: 85%; }
        .msg.me { align-self: flex-end; border-color: var(--xenon); background: #081516; }
        .u-name { font-size: 10px; color: var(--xenon); display: block; margin-bottom: 4px; font-weight: bold; }
        .system-msg { font-size: 11px; color: #555; text-align: center; margin: 10px 0; border-top: 1px solid #111; padding-top: 5px; }

        /* Video Overlay */
        #call-ui { position: absolute; top: 10px; right: 10px; width: 240px; z-index: 100; display: none; flex-direction: column; gap: 5px; }
        video { width: 100%; border-radius: 8px; border: 1px solid var(--xenon); background: #000; }
        #local-v { width: 60px; align-self: flex-end; border-color: #444; }

        /* Controls */
        .controls { padding: 20px; background: var(--panel); border-top: 1px solid #1a1a1a; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; background: #000; border: 1px solid #222; color: #fff; border-radius: 6px; outline: none; }
        .btn { padding: 10px 15px; background: var(--xenon); border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: #000; }
        .btn-call { background: #111; color: var(--xenon); border: 1px solid var(--xenon); width: 100%; margin-top: 5px; }

        /* Login */
        #login { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .box { background: #0a0a0a; padding: 40px; border-radius: 12px; border: 1px solid #222; width: 320px; text-align: center; }
    </style>
</head>
<body>

    <div id="login">
        <div class="box">
            <h2 style="color:var(--xenon)">XENON ONYX</h2>
            <input type="text" id="user-in" placeholder="Username...">
            <button class="btn" style="width:100%; margin-top:10px;" onclick="boot()">INITIALIZE</button>
        </div>
    </div>

    <div id="app">
        <div class="rail">
            <div class="s-btn active">HQ</div>
            <div class="s-btn" onclick="alert('Server Creation: Shared Seed required.')">+</div>
        </div>

        <div class="side">
            <div class="id-card" id="my-id" onclick="copyID()">Connecting to Peer Cloud...</div>
            <p style="font-size:10px; color:#444">TARGET UUID</p>
            <input type="text" id="target-id" placeholder="uuid://...">
            <button class="btn" onclick="connect()" style="width:100%; margin-top:5px;">CONNECT</button>
            <button class="btn btn-call" onclick="makeCall()">VIDEO CALL</button>
        </div>

        <div class="main">
            <div id="call-ui">
                <video id="remote-v" autoplay playsinline></video>
                <video id="local-v" autoplay muted playsinline></video>
                <button class="btn" style="background:var(--red); color:#fff" onclick="endCall()">END</button>
            </div>
            <div id="chat-flow"></div>
            <div class="controls">
                <input type="text" id="chat-in" placeholder="Message..." onkeypress="if(event.key==='Enter') send()">
                <button class="btn" onclick="send()">SEND</button>
            </div>
        </div>
    </div>

    <script>
        let peer, conn, user, myStream;

        function boot() {
            user = document.getElementById('user-in').value || "User";
            peer = new Peer();
            
            peer.on('open', id => {
                document.getElementById('my-id').innerText = "uuid://" + id;
                document.getElementById('login').style.display = 'none';
                document.getElementById('app').style.display = 'grid';
                sysMsg("System: Peer Engine Online.");
            });

            peer.on('error', err => sysMsg("Error: " + err.type));

            // Receive Connection
            peer.on('connection', incoming => {
                conn = incoming;
                bindEvents();
            });

            // Receive Call
            peer.on('call', call => {
                if(confirm("Incoming Call from " + call.peer)) {
                    navigator.mediaDevices.getUserMedia({video:true, audio:true}).then(s => {
                        myStream = s;
                        call.answer(s);
                        document.getElementById('call-ui').style.display = 'flex';
                        document.getElementById('local-v').srcObject = s;
                        call.on('stream', rs => document.getElementById('remote-v').srcObject = rs);
                    });
                }
            });
        }

        function connect() {
            const tid = document.getElementById('target-id').value.replace('uuid://','').trim();
            conn = peer.connect(tid, {metadata: {user: user}});
            bindEvents();
        }

        function bindEvents() {
            conn.on('open', () => {
                sysMsg("Connected to Peer.");
                conn.on('data', data => pushMsg(data.u, data.v));
            });
        }

        function send() {
            const input = document.getElementById('chat-in');
            if(conn && input.value) {
                conn.send({u: user, v: input.value});
                pushMsg(user, input.value, true);
                input.value = "";
            }
        }

        async function makeCall() {
            const tid = document.getElementById('target-id').value.replace('uuid://','').trim();
            myStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
            document.getElementById('call-ui').style.display = 'flex';
            document.getElementById('local-v').srcObject = myStream;
            const call = peer.call(tid, myStream);
            call.on('stream', rs => document.getElementById('remote-v').srcObject = rs);
        }

        function endCall() {
            document.getElementById('call-ui').style.display = 'none';
            myStream.getTracks().forEach(t => t.stop());
        }

        function pushMsg(u, v, me=false) {
            const flow = document.getElementById('chat-flow');
            const d = document.createElement('div');
            d.className = `msg ${me?'me':''}`;
            d.innerHTML = `<span class="u-name">${u}</span>${v}`;
            flow.appendChild(d);
            flow.scrollTop = flow.scrollHeight;
        }

        function sysMsg(t) {
            const flow = document.getElementById('chat-flow');
            const d = document.createElement('div');
            d.className = 'system-msg';
            d.innerText = t;
            flow.appendChild(d);
        }

        function copyID() {
            navigator.clipboard.writeText(document.getElementById('my-id').innerText);
            alert("UUID Copied.");
        }
    </script>
</body>
</html>
