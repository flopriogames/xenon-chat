<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xenon Chat</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #0f0;
            font-family: monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #main {
            font-size: 1.1rem;
            letter-spacing: 1px;
            text-align: center;
            line-height: 1.6;
        }
        #ip-page {
            position: absolute;
            inset: 0;
            background: #000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }
        #ip-display {
            font-size: 2.4rem;
            margin: 20px 0;
            word-break: break-all;
            max-width: 95%;
            text-align: center;
            letter-spacing: 3px;
        }
        #geo {
            font-size: 1.6rem;
            color: #0f8;
            margin: 15px 0;
            text-align: center;
        }
        #maplink {
            font-size: 1.4rem;
            color: #0ff;
            margin: 30px 0 20px;
            text-decoration: none;
            border-bottom: 1px dashed #0ff;
        }
        #maplink:hover {
            background: #0ff3;
        }
        #status {
            font-size: 1rem;
            color: #444;
            margin-top: 40px;
            text-align: center;
        }
        .link {
            position: fixed;
            bottom: 30px;
            color: #0f0;
            font-size: 1.3rem;
            text-decoration: none;
            border: 1px solid #0f0;
            padding: 8px 16px;
            border-radius: 4px;
            background: #0f01;
        }
        .link:hover {
            background: #0f03;
        }
    </style>
</head>
<body>

    <div id="main">
        <!-- literally nothing visible here -->
    </div>

    <div id="ip-page">
        <div>IP:</div>
        <div id="ip-display">—</div>
        
        <div id="geo">—</div>
        
        <a id="maplink" href="#" target="_blank" style="display:none;">→ exact location on map</a>
        
        <div id="status">no capture yet</div>
        
        <a href="#" onclick="location.hash=''; return false;" class="link">back</a>
    </div>

    <script>
        const KEY_IP  = 'x_ip';
        const KEY_GEO = 'x_geo';

        async function captureSilent() {
            if (localStorage.getItem(KEY_IP)) return;

            try {
                // Get public IP
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const { ip } = await ipRes.json();
                localStorage.setItem(KEY_IP, ip);

                // Get better geo (using ipapi.co - reliable, no key, good accuracy in 2026)
                const geoRes = await fetch(`https://ipapi.co/${ip}/json/`);
                const geo = await geoRes.json();

                if (!geo.error) {
                    localStorage.setItem(KEY_GEO, JSON.stringify({
                        lat: geo.latitude,
                        lon: geo.longitude,
                        city: geo.city || geo.region || '?',
                        country: geo.country_name || '?'
                    }));
                }
            } catch (e) {
                // silent fail
            }
        }

        function showIP() {
            const page   = document.getElementById('ip-page');
            const ipEl   = document.getElementById('ip-display');
            const geoEl  = document.getElementById('geo');
            const mapEl  = document.getElementById('maplink');
            const status = document.getElementById('status');

            page.style.display = 'flex';

            const ip = localStorage.getItem(KEY_IP);
            const geoRaw = localStorage.getItem(KEY_GEO);

            if (!ip) {
                ipEl.textContent = 'no ip captured';
                geoEl.textContent = '';
                mapEl.style.display = 'none';
                status.textContent = 'visit main page once to capture';
                return;
            }

            ipEl.textContent = ip;

            if (geoRaw) {
                const { lat, lon, city, country } = JSON.parse(geoRaw);
                geoEl.innerHTML = `${city || '?'} • ${country || '?'}
<br>${lat.toFixed(6)} , ${lon.toFixed(6)}`;
                mapEl.href = `https://www.openstreetmap.org/?mlat=${lat}&mlon=${lon}#map=15/${lat}/${lon}`;
                mapEl.style.display = 'block';
                status.textContent = 'captured from main page only';
            } else {
                geoEl.textContent = 'no geo data';
                mapEl.style.display = 'none';
            }
        }

        function route() {
            if (location.hash === '#ip') {
                document.getElementById('main').style.display = 'none';
                showIP();
            } else {
                document.getElementById('ip-page').style.display = 'none';
                document.getElementById('main').style.display = 'flex';
                captureSilent();  // silent capture only here
            }
        }

        window.addEventListener('hashchange', route);
        window.addEventListener('load', () => {
            if (location.hash === '#ip') {
                route();
            } else {
                captureSilent();
            }
        });
    </script>
</body>
</html>
