<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xenon Chat</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #000;
            color: #0f0;
            font-family: monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #landing {
            text-align: center;
        }
        .glitch {
            font-size: 5rem;
            letter-spacing: 15px;
            animation: glitch 3s infinite;
            text-shadow: 2px 0 #f00, -2px 0 #0ff;
        }
        @keyframes glitch {
            0%,100% { text-shadow: 2px 0 #f00, -2px 0 #0ff; }
            20% { text-shadow: -2px 0 #f00, 2px 0 #0ff; }
            40% { text-shadow: 2px 0 #0f0, -2px 0 #f0f; }
        }
        #hidden-data {
            position: absolute;
            left: -9999px;
            opacity: 0;
            pointer-events: none;
        }
        #ip-view {
            display: none;
            text-align: center;
            padding: 20px;
            max-width: 90%;
        }
        #ip-display {
            font-size: 2.8rem;
            word-break: break-all;
            margin: 20px 0;
        }
        #geo {
            font-size: 2rem;
            color: #0f8;
            margin: 20px 0;
        }
        #maplink {
            font-size: 1.5rem;
            color: #0ff;
            text-decoration: none;
        }
        #status {
            font-size: 1.2rem;
            color: #555;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <div id="landing">
        <div class="glitch">XENON CHAT</div>
        <p style="margin-top: 60px; font-size: 1.6rem;">loading shadow node...</p>
    </div>

    <!-- Hidden text that holds the captured data -->
    <div id="hidden-data"></div>

    <div id="ip-view">
        <div>SHADOW NODE DATA</div>
        <div id="ip-display">—</div>
        <div id="geo">—</div>
        <a id="maplink" href="#" target="_blank" style="display:none;">→ EXACT COORDINATES</a>
        <div id="status">data loaded from hidden node</div>
    </div>

    <script>
        const hiddenEl = document.getElementById("hidden-data");
        const ipView = document.getElementById("ip-view");

        async function captureIP() {
            try {
                // Get public IP
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const { ip } = await ipRes.json();

                // Get geo (using free no-key API)
                let geoRes = await fetch(`https://ipapi.co/${ip}/json/`);
                let geo = await geoRes.json();

                if (geo.error) {
                    geoRes = await fetch(`https://ip-api.com/json/${ip}`);
                    geo = await geoRes.json();
                }

                if (!geo.error && geo.status !== 'fail') {
                    const data = {
                        ip: ip,
                        city: geo.city || geo.regionName || '?',
                        country: geo.country || geo.countryName || '?',
                        lat: geo.latitude || geo.lat || 0,
                        lon: geo.longitude || geo.lon || 0,
                        ts: Date.now()
                    };

                    // Store as JSON string in hidden element
                    hiddenEl.textContent = JSON.stringify(data);
                    console.log("Captured & hidden:", data); // for debug
                }
            } catch (e) {
                console.error("Capture failed:", e);
                hiddenEl.textContent = JSON.stringify({ error: "Capture failed" });
            }
        }

        function showIP() {
            document.getElementById("landing").style.display = "none";
            ipView.style.display = "flex";

            const raw = hiddenEl.textContent.trim();
            if (!raw) {
                document.getElementById("ip-display").textContent = "NO DATA";
                document.getElementById("status").textContent = "Nothing captured yet — load main page first";
                return;
            }

            try {
                const data = JSON.parse(raw);

                if (data.error) {
                    document.getElementById("ip-display").textContent = "ERROR";
                    document.getElementById("status").textContent = data.error;
                    return;
                }

                document.getElementById("ip-display").textContent = data.ip;
                document.getElementById("geo").innerHTML = `${data.city} • ${data.country}<br>${data.lat.toFixed(6)}, ${data.lon.toFixed(6)}`;

                if (data.lat && data.lon) {
                    const map = document.getElementById("maplink");
                    map.href = `https://www.openstreetmap.org/?mlat=${data.lat}&mlon=${data.lon}#map=15/${data.lat}/${data.lon}`;
                    map.style.display = "inline-block";
                }

                document.getElementById("status").textContent = `Captured at ${new Date(data.ts).toLocaleString()}`;
            } catch (e) {
                document.getElementById("ip-display").textContent = "PARSE ERROR";
                document.getElementById("status").textContent = "Invalid hidden data";
            }
        }

        // Run capture on main load
        captureIP();

        // Check hash for #ip
        function handleHash() {
            if (location.hash === "#ip") {
                showIP();
            }
        }

        window.addEventListener("hashchange", handleHash);
        window.addEventListener("load", handleHash);
    </script>
</body>
</html>
