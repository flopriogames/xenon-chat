<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xenon Onyx | Hardened Call</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --onyx: #050505; --panel: #0c0c0d; --xenon: #00f2ff; --red: #ff3b3b; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--onyx); color: #fff; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        
        #app { display: none; height: 100vh; width: 100vw; flex-direction: row; }
        .side { width: 280px; background: var(--panel); border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; padding: 15px; flex-shrink: 0; }
        .main { flex-grow: 1; display: flex; flex-direction: column; background: var(--onyx); position: relative; }
        
        #chat-flow { flex: 1; overflow-y: scroll; padding: 25px; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px; border-radius: 10px; background: #111; border: 1px solid #222; max-width: 80%; }
        .msg.me { align-self: flex-end; border-color: var(--xenon); background: #0a1a1b; }

        /* REBUILT CALL UI */
        #call-ui { position: fixed; top: 20px; right: 20px; width: 340px; z-index: 999; display: none; background: #000; border: 2px solid var(--xenon); border-radius: 12px; box-shadow: 0 0 40px #000; overflow: hidden; }
        .v-container { position: relative; width: 100%; background: #000; aspect-ratio: 16/9; }
        video#remote-v { width: 100%; height: 100%; object-fit: cover; }
        video#local-v { width: 90px; position: absolute; bottom: 10px; right: 10px; border: 1px solid #fff; border-radius: 4px; z-index: 1001; }
        
        .call-btns { display: flex; background: #050505; border-top: 1px solid #222; padding: 8px; gap: 8px; }
        .c-btn { flex: 1; padding: 8px; font-size: 10px; font-weight: bold; cursor: pointer; border-radius: 4px; border: 1px solid #333; background: #111; color: #fff; }

        .btn { padding: 10px; background: var(--xenon); border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: #000; width: 100%; }
        #login { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .debug-tag { font-size: 9px; color: #444; text-transform: uppercase; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login">
        <div style="background:#0a0a0a; padding:40px; border-radius:15px; border:1px solid #222; text-align:center; width:340px;">
            <h1 style="color:var(--xenon)">XENON</h1>
            <input type="text" id="user-in" placeholder="Username..." style="width:100%; margin:20px 0; padding:12px; background:#000; border:1px solid #333; color:#fff;">
            <button class="btn" onclick="boot()">BOOT SYSTEM</button>
        </div>
    </div>

    <div id="app">
        <div class="side">
            <div id="my-id" style="font-size:10px; color:var(--xenon); margin-bottom:15px; cursor:pointer;" onclick="copyID()">Generating...</div>
            <input type="text" id="target-id" placeholder="Target UUID" style="padding:10px; background:#000; border:1px solid #333; color:#fff; margin-bottom:10px; font-size:12px;">
            <button class="btn" onclick="connect()" style="background:#111; color:var(--xenon); border:1px solid var(--xenon)">LINK PEER</button>
            
            <div style="margin-top:25px;">
                <button class="btn" onclick="initiateCall()">OPEN CALL PORT</button>
                <div class="debug-tag">System Status: <span id="sys-stat" style="color:var(--xenon)">Idle</span></div>
            </div>

            <button class="btn" style="margin-top:auto; background:#222; color:#fff;" onclick="document.getElementById('m-in').click()">ATTACH MEDIA</button>
            <input type="file" id="m-in" style="display:none" onchange="sendMedia(this)">
        </div>

        <div class="main">
            <div id="call-ui">
                <div class="v-container">
                    <video id="remote-v" autoplay playsinline></video>
                    <video id="local-v" autoplay muted playsinline></video>
                </div>
                <div class="call-btns">
                    <button class="c-btn" onclick="endCall()" style="background:var(--red)">DISCONNECT</button>
                </div>
            </div>
            
            <div id="chat-flow"></div>

            <div style="padding:20px; background:var(--panel); display:flex; gap:10px;">
                <input type="text" id="chat-in" placeholder="Transmit..." style="flex:1; padding:12px; background:#000; border:1px solid #333; color:#fff;" onkeypress="if(event.key==='Enter') sendText()">
                <button class="btn" style="width:80px;" onclick="sendText()">SEND</button>
            </div>
        </div>
    </div>

    <script>
        let peer, conn, user, myStream;

        function boot() {
            user = document.getElementById('user-in').value || "Agent";
            peer = new Peer({
                config: {'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }]} // CRITICAL FOR REAL WEB CALLS
            });
            
            peer.on('open', id => {
                document.getElementById('my-id').innerText = "uuid://" + id;
                document.getElementById('login').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                updateStat("Online");
            });

            peer.on('error', err => {
                pushSys("ERROR: " + err.type);
                console.error(err);
            });

            // HANDLE INCOMING CALLS
            peer.on('call', async call => {
                updateStat("Incoming Stream...");
                const stream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
                myStream = stream;
                call.answer(stream);
                showCallUI(stream);
                call.on('stream', rs => document.getElementById('remote-v').srcObject = rs);
            });

            peer.on('connection', c => { conn = c; setupConn(); });
        }

        function connect() {
            const tid = document.getElementById('target-id').value.replace('uuid://','').trim();
            if(!tid) return alert("Enter a ID");
            conn = peer.connect(tid, {metadata: {u: user}});
            setupConn();
        }

        function setupConn() {
            conn.on('open', () => {
                pushSys("Connected to " + (conn.metadata?.u || "Peer"));
                conn.on('data', data => {
                    if(data.type === 'text') pushMsg(data.u, data.v);
                    if(data.type === 'media') pushMedia(data.u, data.v, data.k);
                    if(data.type === 'invite') pushInvite(data.u);
                });
            });
        }

        async function initiateCall() {
            if(!conn) return alert("Link a Peer first!");
            updateStat("Acquiring Media...");
            try {
                myStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
                showCallUI(myStream);
                conn.send({type: 'invite', u: user});
                pushInvite(user, true);
            } catch(e) {
                alert("Camera/Mic Blocked! Check browser permissions.");
                updateStat("Hardware Error");
            }
        }

        async function joinCall() {
            const tid = document.getElementById('target-id').value.replace('uuid://','').trim();
            updateStat("Syncing Stream...");
            myStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
            showCallUI(myStream);
            const call = peer.call(tid, myStream);
            call.on('stream', rs => {
                document.getElementById('remote-v').srcObject = rs;
                updateStat("Live Link Active");
            });
        }

        function showCallUI(stream) {
            document.getElementById('call-ui').style.display = 'block';
            document.getElementById('local-v').srcObject = stream;
        }

        function endCall() {
            document.getElementById('call-ui').style.display = 'none';
            if(myStream) myStream.getTracks().forEach(t => t.stop());
            updateStat("Call Ended");
        }

        function updateStat(t) { document.getElementById('sys-stat').innerText = t; }

        /* Media & Text Logic */
        function sendText() {
            const i = document.getElementById('chat-in');
            if(conn && i.value) {
                conn.send({type:'text', u:user, v:i.value});
                pushMsg(user, i.value, true);
                i.value = "";
            }
        }

        function sendMedia(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = () => {
                const k = file.type.startsWith('video') ? 'v' : 'i';
                conn.send({type:'media', u:user, v:reader.result, k: k});
                pushMedia(user, reader.result, k, true);
            };
            reader.readAsDataURL(file);
        }

        function pushMsg(u,v,m=false){ const f=document.getElementById('chat-flow'); const d=document.createElement('div'); d.className=`msg ${m?'me':''}`; d.innerHTML=`<small style="color:var(--xenon)">${u}</small><br>${v}`; f.appendChild(d); }
        function pushMedia(u,v,k,m=false){ const f=document.getElementById('chat-flow'); const d=document.createElement('div'); d.className=`msg ${m?'me':''}`; const tag=k==='v'?`<video src="${v}" controls></video>`:`<img src="${v}">`; d.innerHTML=`<small style="color:var(--xenon)">${u}</small>${tag}`; f.appendChild(d); }
        function pushInvite(u, m=false){ const f=document.getElementById('chat-flow'); const d=document.createElement('div'); d.className=`msg ${m?'me':''}`; d.innerHTML=`<div style="border:1px dashed var(--xenon);padding:10px;text-align:center;"><b>${u}</b> is calling.<br>${!m?`<button class="btn" style="margin-top:5px" onclick="joinCall()">JOIN</button>`:`<small>Waiting for peer...</small>`}</div>`; f.appendChild(d); }
        function pushSys(t){ const f=document.getElementById('chat-flow'); const d=document.createElement('div'); d.style="text-align:center;color:#444;font-size:10px;margin:10px 0;"; d.innerText="[ "+t+" ]"; f.appendChild(d); }
        function copyID(){ navigator.clipboard.writeText(document.getElementById('my-id').innerText); alert("ID Copied."); }
    </script>
</body>
</html>
