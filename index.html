<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal IP Demo</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #0f0;
            font-family: monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        #home, #ip {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.4s;
        }
        .hidden { opacity: 0; pointer-events: none; }
        a {
            color: #0f0;
            text-decoration: none;
            border-bottom: 1px dashed #0f0;
            padding: 4px 8px;
            margin: 20px;
            font-size: 1.4rem;
        }
        a:hover { background: #0f03; }
        #ip-display {
            font-size: 2.8rem;
            margin: 20px 0;
            word-break: break-all;
            max-width: 90%;
            text-align: center;
            letter-spacing: 2px;
        }
        #geo {
            font-size: 1.5rem;
            color: #0f8;
            margin: 10px 0;
            text-align: center;
        }
        #maplink {
            font-size: 1.2rem;
            color: #0ff;
            margin-top: 30px;
        }
        #status {
            font-size: 1rem;
            color: #555;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <div id="home">
        <div>CAPTURING...</div>
        <a href="#ip" onclick="go('ip'); return false;">→ /ip</a>
    </div>

    <div id="ip" class="hidden">
        <div>Your IP:</div>
        <div id="ip-display">—</div>
        
        <div id="geo">—</div>
        
        <a id="maplink" href="#" target="_blank" style="display:none;">→ Open exact coordinates on map</a>
        
        <div id="status">No data yet — go back to home first</div>
        
        <a href="#home" onclick="go('home'); return false;">← home</a>
    </div>

    <script>
        const STORAGE_KEY_IP  = 'cap_ip';
        const STORAGE_KEY_GEO = 'cap_geo';

        function go(page) {
            document.getElementById('home').classList.toggle('hidden', page !== 'home');
            document.getElementById('ip').classList.toggle('hidden', page !== 'ip');

            if (page === 'home') capture();
            if (page === 'ip')   display();
        }

        async function capture() {
            // Already captured? skip
            if (localStorage.getItem(STORAGE_KEY_IP)) return;

            try {
                // Step 1: get public IP
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const { ip } = await ipRes.json();
                localStorage.setItem(STORAGE_KEY_IP, ip);

                // Step 2: get geo (lat/lon + more) — using a reliable no-key API
                const geoRes = await fetch(`https://ip-api.com/json/${ip}?fields=status,message,country,city,lat,lon,timezone`);
                const geo = await geoRes.json();

                if (geo.status === 'success') {
                    localStorage.setItem(STORAGE_KEY_GEO, JSON.stringify({
                        lat: geo.lat,
                        lon: geo.lon,
                        city: geo.city || '?',
                        country: geo.country || '?'
                    }));
                }
            } catch (e) {
                console.warn('Capture failed', e);
            }
        }

        function display() {
            const ipEl    = document.getElementById('ip-display');
            const geoEl   = document.getElementById('geo');
            const mapLink = document.getElementById('maplink');
            const status  = document.getElementById('status');

            const ip = localStorage.getItem(STORAGE_KEY_IP);
            const geoRaw = localStorage.getItem(STORAGE_KEY_GEO);

            if (!ip) {
                ipEl.textContent = 'No IP captured yet';
                geoEl.textContent = '';
                mapLink.style.display = 'none';
                status.textContent = 'Visit home page first to capture';
                return;
            }

            ipEl.textContent = ip;

            if (geoRaw) {
                const { lat, lon, city, country } = JSON.parse(geoRaw);
                geoEl.innerHTML = `${city}, ${country}<br>→ ${lat.toFixed(6)}, ${lon.toFixed(6)}`;
                mapLink.href = `https://www.google.com/maps?q=${lat},${lon}`;
                mapLink.style.display = 'inline-block';
                status.textContent = 'Captured from normal page only';
            } else {
                geoEl.textContent = 'No geo data (capture failed)';
                mapLink.style.display = 'none';
            }
        }

        // Simple hash router
        function route() {
            const hash = location.hash.slice(1) || 'home';
            go(hash);
        }

        window.addEventListener('hashchange', route);
        window.addEventListener('load', route);
    </script>
</body>
</html>
