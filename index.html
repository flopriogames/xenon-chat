<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xenon Chat</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #0f0;
            font-family: monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #main {
            font-size: 1.1rem;
            letter-spacing: 1px;
            text-align: center;
            line-height: 1.6;
        }
        #ip-page {
            position: absolute;
            inset: 0;
            background: #000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }
        #ip-display {
            font-size: 2.4rem;
            margin: 20px 0;
            word-break: break-all;
            max-width: 95%;
            text-align: center;
            letter-spacing: 3px;
        }
        #geo {
            font-size: 1.6rem;
            color: #0f8;
            margin: 15px 0;
            text-align: center;
            min-height: 3.2rem;
        }
        #maplink {
            font-size: 1.4rem;
            color: #0ff;
            margin: 30px 0 20px;
            text-decoration: none;
            border-bottom: 1px dashed #0ff;
        }
        #maplink:hover {
            background: #0ff3;
        }
        #status {
            font-size: 1rem;
            color: #444;
            margin-top: 40px;
            text-align: center;
        }
        .link {
            position: fixed;
            bottom: 30px;
            color: #0f0;
            font-size: 1.3rem;
            text-decoration: none;
            border: 1px solid #0f0;
            padding: 8px 16px;
            border-radius: 4px;
            background: #0f01;
        }
        .link:hover {
            background: #0f03;
        }
        .loading {
            color: #555;
            font-size: 1.2rem;
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <div id="main">
        <!-- completely empty / nothing visible -->
    </div>

    <div id="ip-page">
        <div>IP:</div>
        <div id="ip-display">—</div>
        
        <div id="geo">—</div>
        
        <a id="maplink" href="#" target="_blank" style="display:none;">→ exact location on map</a>
        
        <div id="status" class="loading">fetching live data...</div>
        
        <a href="#" onclick="location.hash=''; return false;" class="link">back</a>
    </div>

    <script>
        const KEY_IP  = 'x_ip';
        const KEY_GEO = 'x_geo';
        const REFRESH_INTERVAL = 10000; // 10 seconds

        async function fetchData() {
            try {
                // Step 1: Get IP + full geo in one call using reliable no-key API (ip-api.com - still free & no key in 2026)
                const res = await fetch('https://ip-api.com/json/?fields=status,message,query,country,city,lat,lon,timezone,isp,org');
                const data = await res.json();

                if (data.status === 'success') {
                    const ip = data.query;
                    const geo = {
                        lat: data.lat,
                        lon: data.lon,
                        city: data.city || '?',
                        country: data.country || '?',
                        isp: data.isp || data.org || '?'
                    };

                    localStorage.setItem(KEY_IP, ip);
                    localStorage.setItem(KEY_GEO, JSON.stringify(geo));
                    return { ip, geo };
                }
            } catch (e) {
                console.warn('Fetch failed', e);
            }
            return null;
        }

        function updateDisplay() {
            const ipEl   = document.getElementById('ip-display');
            const geoEl  = document.getElementById('geo');
            const mapEl  = document.getElementById('maplink');
            const status = document.getElementById('status');

            const ip = localStorage.getItem(KEY_IP);
            const geoRaw = localStorage.getItem(KEY_GEO);

            if (!ip || !geoRaw) {
                ipEl.textContent = '—';
                geoEl.textContent = 'no data yet';
                mapEl.style.display = 'none';
                status.textContent = 'waiting for capture...';
                return;
            }

            const { lat, lon, city, country } = JSON.parse(geoRaw);

            ipEl.textContent = ip;
            geoEl.innerHTML = `${city} • ${country}<br>${lat.toFixed(6)}, ${lon.toFixed(6)}`;

            mapEl.href = `https://www.openstreetmap.org/?mlat=${lat}&mlon=${lon}#map=16/${lat}/${lon}`;
            mapEl.style.display = 'block';

            status.textContent = 'live updated • refreshed every 10s';
        }

        async function liveUpdate() {
            const fresh = await fetchData();
            if (fresh) {
                updateDisplay();
            }
        }

        function route() {
            if (location.hash === '#ip') {
                document.getElementById('main').style.display = 'none';
                document.getElementById('ip-page').style.display = 'flex';
                
                // Initial display from storage
                updateDisplay();
                
                // Start live updates
                liveUpdate(); // immediate
                const interval = setInterval(liveUpdate, REFRESH_INTERVAL);

                // Cleanup when leaving page
                window.addEventListener('hashchange', () => {
                    if (location.hash !== '#ip') {
                        clearInterval(interval);
                    }
                }, { once: true });
            } else {
                document.getElementById('ip-page').style.display = 'none';
                document.getElementById('main').style.display = 'flex';
                
                // Silent background capture on main page load/return
                fetchData();
            }
        }

        window.addEventListener('hashchange', route);
        window.addEventListener('load', () => {
            route();
            // Also capture immediately on any load
            if (location.hash !== '#ip') {
                fetchData();
            }
        });
    </script>
</body>
</html>
